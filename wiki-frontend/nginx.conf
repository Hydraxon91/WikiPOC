map $http_user_agent $scraper_route {
    "~*(Discordbot|Twitterbot|facebookexternalhit|Slackbot|LinkedInBot|WhatsApp|TelegramBot|Pinterest|redditbot|Iframely)" "backend";
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /embed/ {
        proxy_pass http://wiki-backend:5050;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /page/ {
        if ($scraper_route) {
            rewrite ^/page/(.+)$ /embed/wiki/$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/forum/[^/]+/[^/]+$ {
        if ($scraper_route) {
            rewrite ^/forum/[^/]+/([^/]+)$ /embed/forum/$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    location /forum/ {
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
