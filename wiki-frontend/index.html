<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="WikiPOC — a collaborative knowledge base" />
    <meta property="og:title" content="WikiPOC">
    <meta property="og:description" content="Explore articles and discussions on WikiPOC">
    <meta property="og:image" content="/logo192.png">
    <meta property="og:url">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="WikiPOC">
    <meta name="twitter:description" content="Explore articles and discussions on WikiPOC">
    <meta name="twitter:image" content="/logo192.png">
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>WikiPOC</title>
  </head>
  <body>
    <script>
      (function() {
        var ua = navigator.userAgent || '';
        var isScraper = /Discordbot|Twitterbot|facebookexternalhit|Slackbot|LinkedInBot|WhatsApp|TelegramBot|Pinterest|redditbot|Iframely/i.test(ua);
        if (!isScraper) return;

        var embedBase = window.location.hostname === 'localhost'
          ? 'http://localhost:5050'
          : 'https://wikipoc-backend.azurewebsites.net';

        var path = window.location.pathname;
        var match;
        if ((match = path.match(/^\/page\/(.+)/))) {
          window.location.replace(embedBase + '/embed/wiki/' + match[1]);
        } else if ((match = path.match(/^\/forum\/[^/]+\/(.+)/))) {
          window.location.replace(embedBase + '/embed/forum/' + match[1]);
        }
      })();
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
