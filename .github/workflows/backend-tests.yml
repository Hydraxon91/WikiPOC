name: Backend Tests
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  tests:
    runs-on: ubuntu-24.04
    env:
      DOTNET_NOLOGO: true
      ASPNETCORE_ENVIRONMENT: Testing
      # CI-only throwaway password — this DB only exists for the duration of
      # this job and is never reachable outside the runner, so a fixed
      # non-secret password here is fine. Must match MSSQL_SA_PASSWORD below.
      CI_SA_PASSWORD: CI_OnlyP@ssw0rd!
      INTEGRATIONTEST_CONNECTIONSTRING: Server=localhost;Database=master;User=sa;Password=CI_OnlyP@ssw0rd!;TrustServerCertificate=True
      PICTURES_PATH_CONTAINER: /tmp/pictures
      JWT_ISSUER_SIGNING_KEY: ${{ secrets.JWT_ISSUER_SIGNING_KEY }}
      JWT_VALID_AUDIENCE: ${{ secrets.JWT_VALID_AUDIENCE }}
      JWT_VALID_ISSUER: ${{ secrets.JWT_VALID_ISSUER }}
      JWT_TOKEN_TIME: ${{ secrets.JWT_TOKEN_TIME }}
    services:
      sql-server:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: CI_OnlyP@ssw0rd!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'CI_OnlyP@ssw0rd!' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore wiki-backend/wiki-backend.sln

      - name: Build
        run: dotnet build wiki-backend/wiki-backend.sln --no-restore --configuration Release

      - name: Create pictures directory
        run: mkdir -p /tmp/pictures

      - name: Run unit tests
        run: dotnet test wiki-backend/UnitTests/UnitTests.csproj --no-build --configuration Release --logger trx

      - name: Run integration tests
        run: dotnet test wiki-backend/IntegrationTests/IntegrationTests.csproj --no-build --configuration Release --logger trx