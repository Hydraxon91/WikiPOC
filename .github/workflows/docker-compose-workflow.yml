name: Build and Push Images

on:
  push:
    branches: [main]

jobs:
  tests:
    uses: ./.github/workflows/backend-tests.yml
    secrets: inherit

  build-and-push:
    needs: tests
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      DOCKER_BUILDKIT: 1

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./wiki-backend/wiki-backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/wiki-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./wiki-frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/wiki-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart App Service
        run: az webapp restart --name wikipoc-backend --resource-group WikiPOC-useeast2-rg
