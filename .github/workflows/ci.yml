name: CI/CD

on:
  push:
    branches: [main, "ci/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: hydraxon91/wikipoc

jobs:
  frontend-lint:
    name: Frontend (ESLint + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wiki-frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: wiki-frontend
      - run: npm run test
        working-directory: wiki-frontend
      - run: npx eslint src/
        working-directory: wiki-frontend

  backend-build:
    name: Backend (Build + Roslyn Analyzers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore wiki-backend/wiki-backend.sln
      - run: dotnet build wiki-backend/wiki-backend.sln --no-restore

  backend-test:
    name: Backend (Unit Tests + Coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore wiki-backend/wiki-backend.sln
      - run: >
          dotnet test wiki-backend/UnitTests/UnitTests.csproj
          --no-restore
          --collect:"XPlat Code Coverage"
          --results-directory coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: coverage/

  codeql-csharp:
    name: CodeQL (C#)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual
      - name: Build C#
        run: dotnet restore wiki-backend/wiki-backend.sln && dotnet build wiki-backend/wiki-backend.sln --no-restore
      - uses: github/codeql-action/analyze@v4

  codeql-javascript:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4

  docker-build:
    name: Docker (Validate Build)
    needs: [frontend-lint, backend-build, backend-test, codeql-csharp, codeql-javascript]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: wiki-backend/wiki-backend/Dockerfile
          push: false
          load: true
          tags: wiki-backend:ci
          build-args: |
            VITE_API_URL=

  docker-publish:
    name: Docker (Push + Trivy)
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=tag
            type=raw,value=latest

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: wiki-backend/wiki-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
        env:
          TRIVY_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: Deploy to Azure
    needs: [docker-publish]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.APP_URL }}
    steps:
      - name: Deploy container to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          images: ${{ env.IMAGE_NAME }}:latest
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
